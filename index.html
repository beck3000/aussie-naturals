<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aussie Naturals | Premium Australian Foods</title>
  <meta name="description" content="Discover premium, natural foods sourced from the pristine environments of Australia.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo">AussieNaturals.</a>
    <nav class="nav-links">
      <select id="langSwitcher" style="border:none; background:transparent; font-family:var(--font-family); font-weight:500; cursor:pointer;"><option value="zh">中文</option><option value="en">English</option></select>
      <a href="orders.html" data-i18n="nav_orders">Order Center</a>
      <a href="index.html" data-i18n="nav_shop">Shop</a>
      <a href="cart.html" class="cart-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
        <span class="cart-count">0</span>
      </a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-content">
      <h1 data-i18n="hero_title">Taste the <br>True Essence of <br><span style="color:var(--accent-color)">Australia</span>.</h1>
      <p data-i18n="hero_subtitle">Premium natural foods sustainably sourced from the pristine landscapes down under.</p>
      <a href="#shop" class="btn btn-accent" data-i18n="btn_explore">Explore Catalog</a>
    </div>
  </section>

  <section id="shop" class="products-section">
    <h2 class="section-title" data-i18n="title_bestsellers">Our Bestsellers</h2>
    <div class="category-tabs" id="categoryTabs">
      <button class="tab-btn active" data-filter="all" data-i18n="tab_all">All Items</button>
      <button class="tab-btn" data-filter="native" data-i18n="tab_native">Native Ingredients</button>
      <button class="tab-btn" data-filter="mushroom" data-i18n="tab_mushroom">Rare Mushrooms</button>
      <button class="tab-btn" data-filter="seafood" data-i18n="tab_seafood">Premium Seafood</button>
      <button class="tab-btn" data-filter="meat" data-i18n="tab_meat">Quality Meats</button>
      <button class="tab-btn" data-filter="oil" data-i18n="tab_oil">Natural Oils</button>
    </div>
    <div class="products-grid">
      <!-- Filled via app.js -->
    </div>
  </section>

  <!-- Add to Cart Modal -->
  <div class="add-modal-overlay" id="addCartModal" style="display:none;">
    <div class="add-modal">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
         <h2 style="font-size:1.4rem" data-i18n="modal_add_title">Select Quantity</h2>
         <span id="closeModalBtn" style="cursor:pointer; font-size:1.5rem; color:var(--text-light);">&times;</span>
      </div>
      <div style="display:flex; gap:1rem; align-items:center;">
         <img id="modalImg" src="" style="width:80px; height:80px; border-radius:8px; object-fit:cover;">
         <div>
           <div id="modalTitle" style="font-weight:600; font-size:1.1rem; margin-bottom:0.5rem">Title</div>
           <div id="modalPrice" style="color:var(--primary-color); font-weight:700;">$0.00</div>
         </div>
      </div>
      <div style="margin:1.5rem 0; display:flex; justify-content:center; align-items:center; gap:1rem;">
         <button class="qty-btn" id="modalReduceBtn">-</button>
         <span id="modalQtyDisplay" style="font-weight:600; font-size:1.2rem;">1</span>
         <button class="qty-btn" id="modalAddBtn">+</button>
      </div>
      <div style="display:flex; gap:1rem;">
         <button class="btn" id="modalCancelBtn" style="flex:1; background:transparent; border:1px solid var(--border-color); color:var(--text-color)" data-i18n="btn_cancel">Cancel</button>
         <button class="btn btn-accent" id="modalConfirmBtn" style="flex:2;" data-i18n="btn_confirm">Add to Cart</button>
      </div>
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
