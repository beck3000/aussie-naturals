<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart | Aussie Naturals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo">AussieNaturals.</a>
    <nav class="nav-links">
      <select id="langSwitcher" style="border:none; background:transparent; font-family:var(--font-family); font-weight:500; cursor:pointer;"><option value="zh">中文</option><option value="en">English</option></select>
      <a href="orders.html" data-i18n="nav_orders">Order Center</a>
      <a href="index.html" data-i18n="nav_continue">Continue Shopping</a>
      <a href="cart.html" class="cart-icon" style="color: var(--primary-color);">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
        <span class="cart-count">0</span>
      </a>
    </nav>
  </header>

  <main class="page-container">
    <h1 style="margin-bottom: 2rem; color: var(--primary-color);" data-i18n="cart_title">Your Cart</h1>
    
    <div class="grid-layout">
      <!-- Cart Items Container -->
      <div id="cart-container">
        <!-- Filled via JS -->
      </div>
      
      <!-- Order Summary -->
      <div>
        <div class="card">
          <h2 style="margin-bottom: 1.5rem; font-size: 1.5rem;" data-i18n="checkout_summary">Order Summary</h2>
          <div class="summary-row">
            <span data-i18n="cart_subtotal">Subtotal</span>
            <span id="cart-subtotal">$0.00</span>
          </div>
          <div class="summary-row">
            <span data-i18n="cart_shipping">Shipping</span>
            <span>$5.00</span>
          </div>
          <div class="summary-row summary-total">
            <span data-i18n="cart_total">Total</span>
            <span id="cart-total">$0.00</span>
          </div>
          <a href="checkout.html" class="btn" id="checkout-btn" style="width: 100%; text-align: center; margin-top: 2rem;" data-i18n="btn_checkout">Proceed to Checkout</a>
        </div>
      </div>
    </div>
  </main>

  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
  <script>
    function renderCart() {
      const container = document.getElementById('cart-container');
      const subtotalEl = document.getElementById('cart-subtotal');
      const totalEl = document.getElementById('cart-total');
      const checkoutBtn = document.getElementById('checkout-btn');

      if (!cart || cart.length === 0) {
        container.innerHTML = `
          <div class="card empty-state">
            <svg style="margin-bottom:1rem;color:var(--text-light)" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <p data-i18n="cart_empty">Your cart is currently empty.</p>
            <a href="index.html" class="btn btn-accent" data-i18n="btn_shop_now">Shop Natural Foods</a>
          </div>
        `;
        subtotalEl.textContent = '$0.00';
        totalEl.textContent = '$0.00';
        checkoutBtn.style.pointerEvents = 'none';
        checkoutBtn.style.opacity = '0.5';
        return;
      }

      container.innerHTML = `<div class="card">${cart.map(item => `
        <div class="cart-item">
          <img src="${item.image}" alt="${item.name}" class="cart-item-img">
          <div class="cart-item-details">
            <h3 class="cart-item-title">${currentLang === 'zh' && item.name_zh ? item.name_zh : item.name}</h3>
            <p style="color:var(--primary-color); font-weight:600;">$${item.price.toFixed(2)}</p>
            <div class="cart-item-controls">
              <button class="qty-btn" onclick="updateQuantity('${item.id}', ${item.quantity - 1})">-</button>
              <input type="text" class="qty-input" value="${item.quantity}" readonly>
              <button class="qty-btn" onclick="updateQuantity('${item.id}', ${item.quantity + 1})">+</button>
              <button class="remove-btn" onclick="removeFromCart('${item.id}')" data-i18n="btn_remove">Remove</button>
            </div>
          </div>
          <div style="font-weight:700; font-size:1.2rem;">
            $${(item.price * item.quantity).toFixed(2)}
          </div>
        </div>
      `).join('')}</div>`;

      const subtotal = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);
      subtotalEl.textContent = `$${subtotal.toFixed(2)}`;
      totalEl.textContent = `$${(subtotal + 5).toFixed(2)}`;
      
      checkoutBtn.style.pointerEvents = 'auto';
      checkoutBtn.style.opacity = '1';
    }

    document.addEventListener('DOMContentLoaded', renderCart);
  </script>
</body>
</html>
