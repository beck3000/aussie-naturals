<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Center | Aussie Naturals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo">AussieNaturals.</a>
    <nav class="nav-links">
      <select id="langSwitcher" style="border:none; background:transparent; font-family:var(--font-family); font-weight:500; cursor:pointer;"><option value="zh">中文</option><option value="en">English</option></select>
      <a href="index.html" data-i18n="nav_shop">Shop</a>
      <a href="cart.html" class="cart-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
        <span class="cart-count">0</span>
      </a>
    </nav>
  </header>

  <main class="page-container" style="max-width: 800px;">
    <h1 style="margin-bottom: 2rem; color: var(--primary-color); text-align: center;" data-i18n="orders_title">My Order History</h1>
    
    <div id="ordersContainer">
      <!-- Loaded via JS -->
      <div class="empty-state">Loading...</div>
    </div>
  </main>

  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const container = document.getElementById('ordersContainer');
      const email = localStorage.getItem('recent_order_email');
      
      const fetchUrl = email ? `/api/orders?email=${encodeURIComponent(email)}` : `/api/orders`;

      try {
        const response = await fetch(fetchUrl);
        if (!response.ok) throw new Error('Failed to fetch orders');
        const orders = await response.json();

        if (orders.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <svg style="margin-bottom:1rem;color:var(--text-light)" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
              <p data-i18n="orders_empty">${translations[currentLang].orders_empty || 'No order records found.'}</p>
              <a href="index.html" class="btn btn-accent" data-i18n="btn_shop_now">${translations[currentLang].btn_shop_now || 'Shop Natural Foods'}</a>
            </div>
          `;
          return;
        }

        container.innerHTML = orders.map(order => {
          const dt = new Date(order.created_at).toLocaleString();
          const itemsHtml = order.items.map(item => `
            <div class="order-item-row">
              <span style="font-weight:500;">${currentLang === 'zh' && item.name_zh ? item.name_zh : item.name}</span>
              <span style="color:var(--text-light)">x${item.quantity}</span>
            </div>
          `).join('');

          return `
            <div class="order-card">
              <div class="order-header">
                <span class="order-id"><span data-i18n="order_id_prefix">${translations[currentLang].order_id_prefix}</span>${order.id}</span>
                <span class="order-date"><span data-i18n="order_date_prefix">${translations[currentLang].order_date_prefix}</span> ${dt}</span>
              </div>
              <div class="order-items">
                ${itemsHtml}
              </div>
              <div style="margin-top:1.5rem; text-align:right; font-weight:700; color:var(--primary-color); font-size:1.2rem; border-top:1px solid #eee; padding-top:1rem;">
                <span data-i18n="order_total">${translations[currentLang].order_total}</span> $${order.total_price.toFixed(2)}
              </div>
            </div>
          `;
        }).join('');

      } catch (err) {
        console.error(err);
        container.innerHTML = '<div class="empty-state">Error loading orders. Ensure backend is running.</div>';
      }
    });
  </script>
</body>
</html>
